name: IndexNow ping

# Nudges Bing / Yandex (and downstream Copilot / ChatGPT search) to re-crawl the
# key pages. Runs daily and on demand. Sitemap covers the 4,000+ profile pages.

on:
  schedule:
    - cron: "30 4 * * *" # daily 04:30 UTC (after data refresh)
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npx tsx scripts/indexnow.ts
